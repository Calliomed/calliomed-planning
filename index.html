// ===================== AVAILABLE SHIFTS (AGENT) =====================
function renderAvailableShifts() {
  if (!STATE.viewWeekStart) STATE.viewWeekStart = getMonday(new Date());
  if (!STATE._mobileDetected) {
    STATE._mobileDetected = true;
    if (window.innerWidth < 700) { STATE.agentTab = 'mobile'; STATE.dispoViewMode = 'list'; }
  }
  const weekStart = STATE.viewWeekStart;
  const days = get4WeekDays(weekStart);

  const prevPeriod = () => { STATE.viewWeekStart = addDays(weekStart, -28); render(); };
  const nextPeriod = () => { STATE.viewWeekStart = addDays(weekStart, 28); render(); };

  const endDay = addDays(weekStart, 27);
  const MONTH_KEYS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const periodLabel = `${weekStart.getDate()} ${t(MONTH_KEYS[weekStart.getMonth()])} – ${endDay.getDate()} ${t(MONTH_KEYS[endDay.getMonth()])} ${endDay.getFullYear()}`;

  // Available = slot exists, has no assignment at all (regardless of agent's own dispo)
  const available = [];
  days.forEach(d => {
    const dateStr = toISO(d);
    SHIFT_DISPLAY_ORDER.forEach(shiftId => {
      const lookupDate = storageDate(dateStr, shiftId);
      const key = `${lookupDate}_${shiftId}`;
      if (!STATE.availData?.slots[key]) return;
      const assigns = getAssignments(lookupDate, shiftId);
      const myAssign = assigns.find(a => a.agent === STATE.user);
      // Only show shifts from open weeks
      if (!myAssign && assigns.length === 0 && isSlotOpen(dateStr, shiftId)) {
        available.push({date: dateStr, shiftId, lookupDate, dispo: getAgentDispo(lookupDate, shiftId, STATE.user)});
      }
    });
  });

  const pendingClaims = new Set(
    STATE.requests
      .filter(r => r.agent === STATE.user && r.type === 'claim' && r.status === 'pending')
      .map(r => `${r.date}_${r.shiftId}`)
  );

  return el('div',{},
    el('div',{class:'page-header'},
      el('div',{},
        el('div',{class:'page-title'},t('availableShifts')),
        el('div',{class:'page-subtitle'},`${available.length} shift(s) non couverts sur 4 semaines`)
      )
    ),
    el('div',{class:'month-nav'},
      el('button',{class:'month-btn',onClick:prevPeriod},'‹ -4 sem.'),
      el('span',{class:'month-label',style:{minWidth:'260px'}}, periodLabel),
      el('button',{class:'month-btn',onClick:nextPeriod},'+4 sem. ›')
    ),
    el('div',{class:'alert alert-info'},'ℹ️ Ces shifts ne sont attribués à personne. Vous pouvez en demander un si vous êtes disponible.'),

    available.length === 0
      ? el('div',{class:'empty-state'},el('div',{class:'empty-icon'},'✅'),el('p',{},'Tous les shifts de cette période sont couverts.'))
      : el('div',{class:'shift-list'},
          ...available.map(s => {
            const sc = SHIFT_COLORS[s.shiftId] || SHIFT_COLORS.S1;
            const isPending = pendingClaims.has(`${s.date}_${s.shiftId}`);
            const myDispo = s.dispo;
            return el('div',{class:'shift-row available', style:{borderLeft:`3px solid ${sc.border}`}},
              el('div',{class:'shift-date'},formatDate(
                s.shiftId==='S4' ? toISO(addDays(new Date(s.date+'T12:00:00'),1)) : s.date
              )),
              el('div',{class:'shift-time',style:{color:sc.text}}, sc.label),
              el('div',{},
                myDispo === 'preferred' ? badge('green', '✓ Vous êtes disponible') :
                myDispo === 'maybe'     ? badge('yellow', '? À confirmer') :
                myDispo === 'ask'       ? badge('orange', 'À vérifier') :
                                          badge('gray', 'Hors disponibilités')
              ),
              el('div',{class:'shift-row-actions'},
                isPending
                  ? badge('orange', t('pendingValidation'))
                  : el('button',{
                      class: myDispo === 'unavailable' ? 'btn btn-secondary' : 'btn btn-success',
                      style:{fontSize:'11px',padding:'4px 10px'},
                      onClick: async ()=>{
                        try {
                          await dbAddRequest('claim', STATE.user, s.date, s.shiftId);
                          showToast(t('requestSent'), 'info');
                          render();
                        } catch(e) {
                          showToast('Erreur : ' + e.message, 'error');
                        }
                      }
                    }, t('request'))
              )
            );
          })
        )
  );
}

// ===================== REQUESTS PAGE (ADMIN) =====================
function renderRequests() {
  const pending = STATE.requests.filter(r => r.status === 'pending');
  const claimReqs = pending.filter(r => r.type === 'claim');
  const rejectReqs = pending.filter(r => r.type === 'reject');

  const handleApprove = async (req) => {
    try {
      await dbUpdateRequest(req.id, 'approved');
      if (req.type === 'claim') {
        setAssignment(req.date, req.shiftId, req.agent);
        await dbSetAssignment(req.date, req.shiftId, req.agent);
      } else if (req.type === 'reject') {
        removeAssignment(req.date, req.shiftId, req.agent);
        await dbRemoveAssignment(req.date, req.shiftId, req.agent);
      }
      notifyRequestResult(req, true).catch(()=>{});
      showToast(t('requestApproved'));
      render();
    } catch(e) { showToast(e.message,'error'); }
  };
  const handleReject = async (req) => {
    try {
      await dbUpdateRequest(req.id, 'rejected');
      notifyRequestResult(req, false).catch(()=>{});
      showToast(t('requestRejected'),'info');
      render();
    } catch(e) { showToast(e.message,'error'); }
  };

  return el('div', {},
    el('div', {class:'page-header'},
      el('div', {class:'page-title'}, t('requests')),
    ),

    el('div',{class:'section-title'}, '📥 ' + t('claimShift') + ` (${claimReqs.length})`),
    claimReqs.length === 0
      ? el('div',{class:'alert alert-info'},t('noRequests'))
      : el('div',{},
          ...claimReqs.map(req =>
            el('div',{class:'request-card claim'},
              el('div',{},
                el('div',{style:{fontWeight:'600'}},displayName(req.agent)),
                el('div',{style:{fontSize:'12px',color:'var(--text3)'}},`${formatDate(req.date)} — ${shiftLabel(req.shiftId)}`),
              ),
              el('div',{class:'shift-row-actions'},
                el('button',{class:'btn btn-success',style:{fontSize:'11px'},onClick:()=>handleApprove(req)},t('approve')),
                el('button',{class:'btn btn-danger',style:{fontSize:'11px'},onClick:()=>handleReject(req)},t('reject'))
              )
            )
          )
        ),

    el('div',{class:'section-title'}, '🚫 ' + t('rejectRequests') + ` (${rejectReqs.length})`),
    rejectReqs.length === 0
      ? el('div',{class:'alert alert-info'},t('noRequests'))
      : el('div',{},
          ...rejectReqs.map(req =>
            el('div',{class:'request-card reject'},
              el('div',{},
                el('div',{style:{fontWeight:'600'}},displayName(req.agent)),
                el('div',{style:{fontSize:'12px',color:'var(--text3)'}},`${formatDate(req.date)} — ${shiftLabel(req.shiftId)}`),
                req.reason ? el('div',{style:{fontSize:'12px',color:'var(--orange)',marginTop:'3px'}},'Raison : '+req.reason) : null
              ),
              el('div',{class:'shift-row-actions'},
                el('button',{class:'btn btn-success',style:{fontSize:'11px'},onClick:()=>handleApprove(req)},t('approve')),
                el('button',{class:'btn btn-danger',style:{fontSize:'11px'},onClick:()=>handleReject(req)},t('reject'))
              )
            )
          )
        )
  );
}

// ===================== IMPORT PAGE =====================
async function adminResetPassword(agentId, newPwd) {
  const hash = await hashPassword(newPwd);
  await sbPatch('agents', `id=eq.${agentId}`, {pwd_hash: hash});
  const ag = STATE.agents.find(a=>a.id===agentId);
  if (ag) ag.pwd_hash = hash;
  showToast(`Mot de passe réinitialisé pour ${displayName(agentId)}`);
  render();
}

function renderImport() {
  return el('div', {},
    el('div', {class:'page-header'},
      el('div', {class:'page-title'}, t('importTitle')),
    ),
    el('div',{class:'alert alert-info'},'ℹ️ ' + t('importSub') + '. ' + t('importFormats')),
    el('div',{class:'card'},
      el('div',{class:'import-zone', onClick:()=>{
        const inp = document.createElement('input');
        inp.type='file';
        inp.accept='.xlsx';
        inp.onchange = e => {
          const file = e.target.files[0];
          if (!file) return;
          showToast(t('importSuccess'));
        };
        inp.click();
      }},
        el('div',{style:{fontSize:'40px'}},'📥'),
        el('p',{},t('importSub')),
        el('small',{},t('importFormats'))
      )
    ),
    el('div',{class:'card',style:{marginTop:'12px'}},
      el('div',{class:'section-title'},'Données actuellement chargées'),
      el('p',{style:{fontSize:'13px',color:'var(--text2)'}},
        `${Object.keys(STATE.availData?.slots||{}).length} créneaux chargés pour ${STATE.availData?.agents?.length||0} agents.`),
      el('p',{style:{fontSize:'12px',color:'var(--text3)',marginTop:'6px'}},
        'Dates : Mai 2026 → Août 2026')
    ),
    el('div',{class:'card',style:{marginTop:'12px'}},
      el('div',{class:'section-title'},'✉️ Configuration email (Brevo)'),
      el('p',{style:{fontSize:'12px',color:'var(--text3)',marginBottom:'10px'}},
        getBrevoKey() ? '✅ Clé Brevo configurée.' : '⚠️ Clé Brevo non configurée — emails désactivés.'),
      el('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginBottom:'12px'}},
        el('input',{type:'password',placeholder:'xkeysib-... (nouvelle clé Brevo)',
          id:'brevo-key-input',
          style:{flex:'1',padding:'7px 10px',border:'1px solid var(--border2)',borderRadius:'var(--radius)',fontSize:'12px',background:'var(--bg)',color:'var(--text)'}}),
        el('button',{class:'btn btn-primary',style:{fontSize:'11px'},onClick:()=>{
          const val = document.getElementById('brevo-key-input').value.trim();
          if(val){ localStorage.setItem('brevo_key',val); showToast('Clé Brevo sauvegardée ✓'); render(); }
        }},'Sauvegarder')
      ),
      el('div',{class:'section-title',style:{marginTop:'8px'}},'Emails des agents'),
      el('p',{style:{fontSize:'12px',color:'var(--text3)',marginBottom:'12px'}},'Adresses configurées pour les envois automatiques.'),
      el('div',{},
        ...STATE.agents.filter(a=>a.id!=='admin').map(ag => {
          const info = AGENT_EMAILS[ag.id] || {email:'', name:ag.id};
          return el('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginBottom:'6px'}},
            el('span',{style:{fontSize:'13px',minWidth:'180px',fontWeight:'500'}}, ag.display_name),
            el('span',{style:{fontSize:'12px',color:info.email?'var(--text2)':'var(--red)'}},
              info.email || '⚠️ Email manquant')
          );
        })
      )
    ),
    el('div',{class:'card',style:{marginTop:'12px',borderColor:'var(--accent)',background:'var(--accent-light)'}},
      el('div',{class:'section-title',style:{color:'var(--accent)'}},'📥 Importer les données depuis les fichiers Excel'),
      el('p',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'12px'}},
        'Charge les disponibilités et les attributions déjà faites depuis vos fichiers Excel (juin–août 2026). À faire une seule fois.'),
      el('button',{class:'btn btn-primary',onClick: seedFromExcel},
        '⚡ Importer maintenant (' + SEED_AVAILABILITY.length + ' disponibilités + ' + SEED_ASSIGNMENTS.length + ' shifts)')
    ),

      el('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
        ...STATE.agents.filter(a=>a.id!=='admin').map(ag => {

    )

}


// ===================== CHANGE PASSWORD PAGE =====================
function renderChangePassword() {
  let oldPwd = '', newPwd = '', newPwd2 = '', msg = '';

  async function doChange() {
    if (!oldPwd || !newPwd || !newPwd2) { msg = 'Tous les champs sont requis.'; render(); return; }
    if (newPwd !== newPwd2) { msg = 'Les nouveaux mots de passe ne correspondent pas.'; render(); return; }
    if (newPwd.length < 4) { msg = 'Mot de passe trop court (4 caractères minimum).'; render(); return; }
    const agentObj = STATE.agents.find(a => a.id === STATE.user);
    const oldHash = await hashPassword(oldPwd);
    if (oldHash !== agentObj?.pwd_hash) { msg = 'Ancien mot de passe incorrect.'; render(); return; }
    const newHash = await hashPassword(newPwd);
    try {
      await sbPatch('agents', `id=eq.${STATE.user}`, {pwd_hash: newHash});
      agentObj.pwd_hash = newHash;
      showToast('Mot de passe modifié avec succès ✓');
      STATE.page = STATE.role === 'admin' ? 'planning' : 'myshifts';
      render();
    } catch(e) { msg = 'Erreur: ' + e.message; render(); }
  }

  return el('div', {},
    el('div', {class:'page-header'},
      el('div', {class:'page-title'}, '🔑 Changer mon mot de passe')
    ),
    el('div', {style:{maxWidth:'400px'}},
      el('div', {class:'card'},
        el('div', {class:'field'},
          el('label', {}, 'Mot de passe actuel'),
          el('input', {type:'password', placeholder:'••••••••',
            onInput: e=>{oldPwd=e.target.value;},
            style:{width:'100%',padding:'9px 12px',border:'1px solid var(--border2)',borderRadius:'var(--radius)',fontSize:'14px',background:'var(--bg)',color:'var(--text)'}})
        ),
        el('div', {class:'field'},
          el('label', {}, 'Nouveau mot de passe'),
          el('input', {type:'password', placeholder:'••••••••',
            onInput: e=>{newPwd=e.target.value;},
            style:{width:'100%',padding:'9px 12px',border:'1px solid var(--border2)',borderRadius:'var(--radius)',fontSize:'14px',background:'var(--bg)',color:'var(--text)'}})
        ),
        el('div', {class:'field'},
          el('label', {}, 'Confirmer le nouveau mot de passe'),
          el('input', {type:'password', placeholder:'••••••••',
            onInput: e=>{newPwd2=e.target.value;},
            onKeydown: e=>{if(e.key==='Enter') doChange();},
            style:{width:'100%',padding:'9px 12px',border:'1px solid var(--border2)',borderRadius:'var(--radius)',fontSize:'14px',background:'var(--bg)',color:'var(--text)'}})
        ),
        msg ? el('div', {class:'alert alert-danger'}, '⚠️ ' + msg) : null,
        el('div', {style:{display:'flex',gap:'8px',marginTop:'8px'}},
          el('button', {class:'btn btn-secondary', onClick:()=>{STATE.page=STATE.role==='admin'?'planning':'myshifts';render();}}, 'Annuler'),
          el('button', {class:'btn btn-primary', onClick: doChange}, '💾 Enregistrer')
        )
      )
    )
  );
}

// ===================== MAIN RENDER =====================
function render() {
  const root = document.getElementById('app');
  root.innerHTML = '';
  try {
  if (STATE.page === 'setup')   { root.appendChild(renderSetup()); return; }
  if (STATE.page === 'loading') { root.appendChild(renderLoadingScreen()); return; }
  if (STATE.page === 'login')   { root.appendChild(renderLogin()); return; }

  const isAdmin = STATE.role === 'admin';
  const pendingCount = STATE.requests.filter(r=>r.status==='pending').length;

  // Mobile bottom navigation
  function renderMobileNav() {
    const agentPages = [
      {page:'myshifts',   emoji:'📋', label:'Mes shifts'},
      {page:'available',  emoji:'🔓', label:'Disponibles'},
      {page:'dispo',      emoji:'✏️',  label:'Mes dispos'},
      {page:'nightcount', emoji:'🌙', label:'Nuits'},
    ];
    const adminPages = [
      {page:'planning',   emoji:'📅', label:'Planning'},
      {page:'requests',   emoji:'🔔', label:'Demandes', badge: pendingCount},
      {page:'agents',     emoji:'👥', label:'Agents'},
      {page:'emails',     emoji:'✉️',  label:'Emails'},
      {page:'import',     emoji:'📥', label:'Import'},
    ];
    const pages = isAdmin ? adminPages : agentPages;

    return el('nav', {class:'mobile-nav'},
      ...pages.map(p =>
        el('button', {
          class:`mobile-nav-btn${STATE.page===p.page?' active':''}`,
          style:{position:'relative'},
          onClick:()=>{STATE.page=p.page;render();}
        },
          el('span',{class:'nav-emoji'}, p.emoji),
          el('span',{}, p.label),
          p.badge ? el('span',{class:'mobile-nav-badge'}, String(p.badge)) : null
        )
      )
    );
  }

  const app = el('div', {class:'app'},
    renderSidebar(),
    el('div', {class:'main'},
      STATE.page === 'planning'   ? renderPlanning() :
      STATE.page === 'myshifts'   ? renderMyShifts() :
      STATE.page === 'available'  ? renderAvailableShifts() :
      STATE.page === 'dispo'      ? renderAvailabilityInput() :
      STATE.page === 'nightcount' ? renderNightCount() :
      STATE.page === 'requests'   ? renderRequests() :
      STATE.page === 'agents'     ? renderAgents() :
      STATE.page === 'emails'     ? renderEmailsAdmin() :
      STATE.page === 'import'     ? renderImport() :
      STATE.page === 'changepwd'  ? renderChangePassword() :
      el('div', {}, 'Page inconnue')
    )
  );

  // Add mobile nav
  app.appendChild(renderMobileNav());

  const modal = renderModal();
  if (modal) app.appendChild(modal);

  // Toasts
  if (STATE.toasts.length > 0) {
    const toastContainer = el('div', {class:'toast-container'},
      ...STATE.toasts.map(t => el('div', {class:`toast toast-${t.type}`}, t.msg))
    );
    app.appendChild(toastContainer);
  }

  root.appendChild(app);
  } catch(err) {
    console.error('Render error:', err);
    root.innerHTML = `
      <div style="padding:40px;font-family:sans-serif;max-width:600px;margin:40px auto">
        <h2 style="color:#b91c1c">⚠️ Erreur de chargement</h2>
        <p style="color:#555;margin:12px 0">Une erreur s'est produite. Détails :</p>
        <pre style="background:#fee2e2;padding:16px;border-radius:8px;font-size:12px;overflow:auto;color:#b91c1c">${err.message}
${err.stack||''}</pre>
        <button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#2563a8;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">
          🔄 Recharger la page
        </button>
        <button onclick="localStorage.clear();location.reload()" style="margin-top:16px;margin-left:8px;padding:10px 20px;background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;border-radius:6px;cursor:pointer;font-size:14px">
          🗑️ Effacer config et recharger
        </button>
      </div>`;
  }
}

// ===================== INIT =====================
// Restore lang preference
if (localStorage.getItem('sb_lang')) STATE.lang = localStorage.getItem('sb_lang');

// Credentials are embedded — go directly to loading
STATE.page = 'loading';
render();
loadAllData().then(() => { STATE.page = 'login'; render(); }).catch(e => {
  showToast('Erreur de connexion : ' + e.message, 'error');
  STATE.page = 'login';
  render();
});
</script>
