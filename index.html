async function seedFromExcel() {
  showToast('Import en cours...', 'info'); render();
  try {
    // Insert availability in batches of 200
    const batchSize = 200;
    for (let i = 0; i < SEED_AVAILABILITY.length; i += batchSize) {
      const batch = SEED_AVAILABILITY.slice(i, i + batchSize);
      await sbUpsert('availability', batch, 'agent_id,date,shift_id');
    }
    // Insert assignments
    if (SEED_ASSIGNMENTS.length > 0) {
      await sbUpsert('assignments', SEED_ASSIGNMENTS, 'date,shift_id,agent_id,type');
    }
    await loadAllData();
    showToast('✓ Données Excel importées : ' + SEED_AVAILABILITY.length + ' disponibilités, ' + SEED_ASSIGNMENTS.length + ' shifts attribués.');
    render();
  } catch(e) {
    showToast('Erreur import: ' + e.message, 'error');
    render();
  }
}

function agentEmail(agentId) {
  const agDb = STATE.agents.find(a => a.id === agentId);
  if (agDb && agDb.email) return {email: agDb.email, name: agDb.display_name};
  return AGENT_EMAILS[agentId] || {email:'', name: displayName(agentId)};
}

async function sendBrevoEmail(to, subject, htmlContent) {
  if (!to || !to.email) { console.warn('No email for', to); return; }
  const res = await fetch('https://api.brevo.com/v3/smtp/email', {
    method: 'POST',
    headers: {
      'api-key': getBrevoKey(),
      'Content-Type': 'application/json',
      'Accept': 'application/json'
    },
    body: JSON.stringify({
      sender: BREVO_SENDER,
      to: [to],
      subject,
      htmlContent
    })
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('Brevo: ' + err);
  }
  return res.json();
}

// ── Email : planning personnel envoyé à chaque agent ──────────────────────
async function sendPlanningToAgents(onlyIds=null) {
  const MONTH_KEYS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const year  = STATE.viewMonth.getFullYear();
  const month = STATE.viewMonth.getMonth();
  const monthLabel = t(MONTH_KEYS[month]) + ' ' + year;
  const SHIFT_LABELS = {S4:'00h–06h ★', S1:'06h–12h', S2:'12h–18h', S3:'18h–00h'};
  const SHIFT_COLORS = {S4:'#6d28d9', S1:'#1d4ed8', S2:'#be185d', S3:'#065f46'};
  const appUrl = window.location.href.split('?')[0];

  const agents = STATE.agents.filter(a => a.role !== 'admin');
  let sent = 0, errors = 0;

  for (const ag of agents) {
    if (onlyIds && !onlyIds.includes(ag.id)) continue;
    const contact = agentEmail(ag.id);
    if (!contact.email) continue;

    // Get this agent's shifts for the month
    const myShifts = Object.entries(STATE.assignments)
      .flatMap(([key, assigns]) => {
        const mine = assigns.filter(a => a.agent === ag.id);
        if (!mine.length) return [];
        const parts = key.split('_');
        const shiftId = parts[parts.length-1];
        const storedDate = parts.slice(0,-1).join('_');
        const [sy,sm] = storedDate.split('-').map(Number);
        if (sy !== year || sm !== month+1) return [];
        // Display date: S4 = stored+1, others = stored
        const displayDate = shiftId === 'S4'
          ? toISO(new Date(new Date(storedDate+'T12:00:00').setDate(new Date(storedDate+'T12:00:00').getDate()+1)))
          : storedDate;
        return mine.map(a => ({displayDate, storedDate, shiftId, type: a.type}));
      })
      .sort((a,b) => a.displayDate.localeCompare(b.displayDate) ||
        ['S4','S1','S2','S3'].indexOf(a.shiftId) - ['S4','S1','S2','S3'].indexOf(b.shiftId));

    if (!myShifts.length) continue;

    // Build shift rows HTML
    const rows = myShifts.map(s => {
      const d = new Date(s.displayDate + 'T12:00:00');
      const dayNames = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
      const dateStr = dayNames[d.getDay()] + ' ' + d.getDate() + ' ' + t(MONTH_KEYS[d.getMonth()]);
      const color = SHIFT_COLORS[s.shiftId] || '#333';
      const label = SHIFT_LABELS[s.shiftId] || s.shiftId;
      const typeBadge = s.type === 'doublon'
        ? '<span style="background:#ede9fe;color:#6d28d9;padding:1px 6px;border-radius:4px;font-size:11px">doublon</span>'
        : '';
      return `<tr>
        <td style="padding:8px 12px;border-bottom:1px solid #f0f0f0;font-size:14px">${dateStr}</td>
        <td style="padding:8px 12px;border-bottom:1px solid #f0f0f0">
          <span style="color:${color};font-weight:600;font-size:14px">${label}</span>

// ===================== SUPABASE API LAYER =====================

function sbHeaders() {
  return {
    'apikey': STATE.supabaseKey,
    'Authorization': 'Bearer ' + STATE.supabaseKey,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
}

async function sbGet(table, params='') {
  const r = await fetch(`${STATE.supabaseUrl}/rest/v1/${table}?${params}`, {headers: sbHeaders()});
  if (!r.ok) throw new Error(`GET ${table}: ${r.status} ${await r.text()}`);
  return r.json();
}

async function sbPost(table, body) {
  const r = await fetch(`${STATE.supabaseUrl}/rest/v1/${table}`, {
    method:'POST', headers: sbHeaders(), body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`POST ${table}: ${r.status} ${await r.text()}`);
  return r.json();
}

async function sbPatch(table, filter, body) {
  const r = await fetch(`${STATE.supabaseUrl}/rest/v1/${table}?${filter}`, {
    method:'PATCH', headers: {...sbHeaders(), 'Prefer':'return=representation'}, body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`PATCH ${table}: ${r.status} ${await r.text()}`);
  return r.json();
}

async function sbUpsert(table, body, onConflict) {
  // Always send array to Supabase
  const payload = Array.isArray(body) ? body : [body];
  const headers = {
    'apikey': STATE.supabaseKey,
    'Authorization': 'Bearer ' + STATE.supabaseKey,
    'Content-Type': 'application/json',
    'Prefer': 'resolution=merge-duplicates'
  };
  const url = onConflict
    ? `${STATE.supabaseUrl}/rest/v1/${table}?on_conflict=${onConflict}`
    : `${STATE.supabaseUrl}/rest/v1/${table}`;
  const r = await fetch(url, {method:'POST', headers, body: JSON.stringify(payload)});
  if (!r.ok) {
    const errText = await r.text();
    throw new Error(`UPSERT ${table}: ${r.status} ${errText}`);
  }
  return r.status === 204 ? [] : r.json().catch(() => []);
}

async function sbDelete(table, filter) {
  const r = await fetch(`${STATE.supabaseUrl}/rest/v1/${table}?${filter}`, {
    method:'DELETE', headers: sbHeaders()
  });
  if (!r.ok) throw new Error(`DELETE ${table}: ${r.status} ${await r.text()}`);
  return r.status === 204 ? [] : r.json();
}

// ── Load all data from Supabase ───────────────────────────────────────────
async function loadAllData() {
  STATE.loading = true; render();
  try {
    // 1. Agents
    let agents = await sbGet('agents', 'order=display_name');
    // If no agents or any agent missing pwd_hash, run seed to set passwords
    const needsSeed = !agents.length || agents.some(a => !a.pwd_hash);
    if (needsSeed) {
      await seedAgents();
      agents = await sbGet('agents', 'order=display_name');
    }
    STATE.agents = agents;

    // Sync emails from AGENT_EMAILS into Supabase for agents missing email
    const toSync = agents.filter(a => !a.email && AGENT_EMAILS[a.id]?.email);
    if (toSync.length > 0) {
      await Promise.all(toSync.map(ag =>
        sbPatch('agents', `id=eq.${ag.id}`, {email: AGENT_EMAILS[ag.id].email}).catch(()=>{})
      ));
      const refreshed = await sbGet('agents', 'order=display_name');
      STATE.agents = refreshed;
    }

    // 2. Availability (all entries — no date filter, load everything)
    const avail = await sbGet('availability', 'order=date,shift_id&limit=50000');
    STATE.availability = {};
    avail.forEach(row => {
      STATE.availability[`${row.agent_id}_${row.date}_${row.shift_id}`] = {
        dispo: row.dispo, doublon: row.doublon
      };
    });

    // 3. Assignments
    const assigns = await sbGet('assignments', 'order=date,shift_id');
    STATE.assignments = {};
    assigns.forEach(row => {
      const key = `${row.date}_${row.shift_id}`;
      if (!STATE.assignments[key]) STATE.assignments[key] = [];
      STATE.assignments[key].push({agent: row.agent_id, type: row.type || 'main'});
    });

    // 4. Requests
    const reqs = await sbGet('requests', 'order=created_at.desc');
    STATE.requests = reqs.map(r => ({
      id: r.id, type: r.type, agent: r.agent_id,
      date: r.date, shiftId: r.shift_id,
      reason: r.reason, status: r.status
    }));

    // 5. Rebuild availData structure for compatibility with existing render functions
    await loadOpenWeeks();
    await loadEmailTemplates();
    await loadDispoUpdates();
    rebuildAvailData();
    updateNightCounts();
    STATE.loading = false;
    render();

    // Auto-refresh every 30s
    if (!STATE._refreshTimer) {
      STATE._refreshTimer = setInterval(silentRefresh, 30000); // 30 sec
    }
  } catch(e) {
    STATE.loading = false;
    showToast('Erreur chargement: ' + e.message, 'error');
    render();
  }
}

async function silentRefresh() {
  // Only pause refresh when a modal is open (admin actively editing)
  if (STATE.modal !== null) return;
  try {
    const assigns = await sbGet('assignments', 'order=date,shift_id');
    STATE.assignments = {};
    assigns.forEach(row => {
      const key = `${row.date}_${row.shift_id}`;
      if (!STATE.assignments[key]) STATE.assignments[key] = [];
      STATE.assignments[key].push({agent: row.agent_id, type: row.type || 'main'});
    });
    const reqs = await sbGet('requests', 'order=created_at.desc');
    STATE.requests = reqs.map(r => ({
      id: r.id, type: r.type, agent: r.agent_id,
      date: r.date, shiftId: r.shift_id,
      reason: r.reason, status: r.status
    }));
    const avail = await sbGet('availability', 'order=date,shift_id&limit=50000');
    // Only overwrite availability if agent has no pending unsaved edits
    // Otherwise the refresh would erase their in-progress work
    const hasPendingEdits = Object.keys(STATE.dispoEdits || {}).length > 0;
    if (!hasPendingEdits) {
      STATE.availability = {};
      avail.forEach(row => {
        STATE.availability[`${row.agent_id}_${row.date}_${row.shift_id}`] = {
          dispo: row.dispo, doublon: row.doublon
        };
      });
      rebuildAvailData();
      updateNightCounts();
    }
    // Show notification if new pending requests appeared
    const newPending = STATE.requests.filter(r=>r.status==='pending').length;
    if (newPending > 0) {
      document.title = `(${newPending}) Calliomed — Planning v5.3`;
    } else {
      document.title = 'Calliomed — Planning v5.3';
    }
    STATE.syncing = true; render();
    setTimeout(() => { STATE.syncing = false; render(); }, 1500);
  } catch(e) { /* silent */ }
}

// Rebuild the availData.slots structure that all rendering functions expect
function extractDateFromKey(k) {
  // Key format: agentId_YYYY-MM-DD_SX  (agentId may contain underscores)
  // Date always matches YYYY-MM-DD pattern
  const m = k.match(/(\d{4}-\d{2}-\d{2})/);
  return m ? m[1] : null;
}

function rebuildAvailData() {
  const allDates = new Set();
  const SHIFTS = ['S4','S1','S2','S3'];

  // From availability entries — extract date correctly
  Object.keys(STATE.availability).forEach(k => {
    const date = extractDateFromKey(k);
    if (date) allDates.add(date);
  });
  // From assignments — key is date_shiftId e.g. 2026-06-01_S1
  Object.keys(STATE.assignments).forEach(k => {
    const date = extractDateFromKey(k);
    if (date) allDates.add(date);
  });

  // Build date range covering all data + 6 months window
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth() - 2, 1);
  const end   = new Date(now.getFullYear(), now.getMonth() + 6, 0);
  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    allDates.add(toISO(d));
  }

  const slots = {};
  const SHIFT_LABELS = {S4:'00h00–06h15',S1:'06h00–12h15',S2:'12h00–18h15',S3:'18h00–00h15'};

  allDates.forEach(date => {
    SHIFTS.forEach(shiftId => {
      const key = `${date}_${shiftId}`;
      const agentMap = {};
      STATE.agents.forEach(ag => {
        const ak = `${ag.id}_${date}_${shiftId}`;
        const info = STATE.availability[ak] || {dispo:'unavailable', doublon:'unavailable'};
        agentMap[ag.id] = info;
      });
      slots[key] = {
        date, shift_id: shiftId,
        shift_label: SHIFT_LABELS[shiftId],
        is_night: shiftId === 'S4',
        agents: agentMap
      };
    });
  });

  STATE.availData = {
    agents: STATE.agents.map(a => a.id),
    slots
  };
}

// ── Seed agents on first setup ────────────────────────────────────────────
// Simple hash function using SubtleCrypto
async function hashPassword(pwd) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function seedAgents() {
  // Default passwords: prénom en minuscules pour les agents, 'admin2026' pour l'admin
  // Ex: Camille → 'camille', Maryse → 'maryse', Baptiste → 'baptiste'
  const agentDefs = [
    {id:'camille',      display_name:'Camille Janssens',      role:'agent', pwd:'camille'},
    {id:'maryse',       display_name:'Maryse Nicolas',        role:'agent', pwd:'maryse'},
    {id:'elodie_gran',  display_name:'Elodie Grandjean',      role:'agent', pwd:'elodie'},
    {id:'emeline',      display_name:'Emeline Descendre',     role:'agent', pwd:'emeline'},
    {id:'manon',        display_name:'Manon Despontin',       role:'agent', pwd:'manon'},
    {id:'baptiste',     display_name:'Baptiste Menendez',     role:'agent', pwd:'baptiste'},
    {id:'elodie_vanr',  display_name:'Elodie Vanrappenbusch', role:'agent', pwd:'elodie2'},
    {id:'sabine',       display_name:'Sabine Lambert',        role:'agent', pwd:'sabine'},
    {id:'admin',        display_name:'Administrateur',        role:'admin', pwd:'admin2026'},
  ];
  const defaultAgents = await Promise.all(agentDefs.map(async a => ({
    id: a.id,
    display_name: a.display_name,
    role: a.role,
    pwd_hash: await hashPassword(a.pwd)
  })));
  // Upsert all agents (creates if missing, updates pwd_hash if exists)
  await sbUpsert('agents', defaultAgents, 'id');
  // Also force-update pwd_hash for agents that already exist without one
  await Promise.all(defaultAgents.map(a =>
    sbPatch('agents', `id=eq.${a.id}&pwd_hash=is.null`, {pwd_hash: a.pwd_hash}).catch(()=>{})
  ));
}

    // Generate ID from name
    const id = form.name.trim().toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')  // remove accents
      .replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');

    if (STATE.agents.find(a => a.id === id)) {
      form.error = "Un agent avec un identifiant similaire existe déjà. Essayez un prénom différent.";
      render(); return;
    }

    form.saving = true; form.error = ''; render();
    try {
      const hash = await hashPassword(form.pwd);
      await sbUpsert('agents', [{
        id, display_name: form.name.trim(),
        role: form.role, email: form.email.trim() || null,
        pwd_hash: hash, no_night: false
      }], 'id');
      // Refresh agents list
      const agents = await sbGet('agents', 'order=display_name');
      STATE.agents = agents;
      const _newAg = {id, display_name: form.name.trim(), email: form.email.trim(), role: form.role};
      const _savedPwd = form.pwd;
      form.name = ''; form.role = 'agent'; form.email = ''; form.pwd = '';
      form.saving = false;
      STATE.modal = {type: 'welcome-email', agent: _newAg, pwd: _savedPwd};
      showToast('Agent créé : ' + id);
      render();
    } catch(e) {
      form.error = 'Erreur : ' + e.message;
      form.saving = false;
      render();
    }
  }

// ===================== DISPO AVAILABILITY HELPERS =====================
const DISPO_OPTS = [
  {val:'preferred', label:'✓ Disponible',   bg:'#dcfce7', border:'#86efac', text:'#15803d'},
  {val:'maybe',     label:'? À confirmer',  bg:'#fef9c3', border:'#fde047', text:'#a16207'},
  {val:'ask',       label:'~ Si besoin',    bg:'#ffedd5', border:'#fdba74', text:'#c2410c'},
  {val:'unavailable',label:'✗ Indispo',     bg:'#fee2e2', border:'#fca5a5', text:'#b91c1c'},
];

const SHIFT_ORDER = ['S4','S1','S2','S3'];

const SHIFT_COLORS_DISPO = {
  S4:{label:'00h–06h ★',bg:'#ede9fe',border:'#c4b5fd',text:'#6d28d9'},
  S1:{label:'06h–12h',  bg:'#dbeafe',border:'#93c5fd',text:'#1d4ed8'},
  S2:{label:'12h–18h',  bg:'#fce7f3',border:'#f9a8d4',text:'#be185d'},
  S3:{label:'18h–00h',  bg:'#d1fae5',border:'#6ee7b7',text:'#065f46'},
};


function getCurrentDispo(date, shiftId) {
  const k = `${STATE.user}_${date}_${shiftId}`;
  return STATE.availability[k]?.dispo || 'unavailable';
}

function cycleDispo(date, shiftId) {
  const current = getCurrentDispo(date, shiftId);
  const idx = DISPO_OPTS.findIndex(o => o.val === current);
  const next = DISPO_OPTS[(idx+1) % DISPO_OPTS.length].val;
  const k = `${STATE.user}_${date}_${shiftId}`;
  STATE.availability[k] = {
    dispo: next,
    doublon: STATE.availability[k]?.doublon || 'unavailable'
  };
  STATE.dispoEdits[`${date}_${shiftId}`] = {dispo: next, doublon: STATE.availability[k].doublon};
  render();
}

function cycleDoublon(date) {
  // Doublon is always on S3 (18h-00h)
  const k = `${STATE.user}_${date}_S3`;
  const current = STATE.availability[k]?.doublon || 'unavailable';
  const idx = DISPO_OPTS.findIndex(o => o.val === current);
  const next = DISPO_OPTS[(idx+1) % DISPO_OPTS.length].val;
  STATE.availability[k] = {
    dispo: STATE.availability[k]?.dispo || 'unavailable',
    doublon: next
  };
  const editKey = `${date}_S3`;
  if (!STATE.dispoEdits[editKey]) {
    STATE.dispoEdits[editKey] = {dispo: STATE.availability[k].dispo, doublon: next};
  } else {
    STATE.dispoEdits[editKey].doublon = next;
  }
  render();
}

async function saveAll() {
  const editKeys = Object.keys(STATE.dispoEdits);
  console.log('[saveAll] called with', editKeys.length, 'edits:', editKeys);
  if (!editKeys.length) { showToast('Rien à sauvegarder','info'); return; }
  STATE.syncing = true; render();
  showToast(`⏳ Sauvegarde de ${editKeys.length} ligne(s)...`, 'info');
  try {
    let saved = 0;
    let firstErr = null;
    for (const [key, val] of Object.entries(STATE.dispoEdits)) {
      const lastUnderscore = key.lastIndexOf('_');
      const date    = key.substring(0, lastUnderscore);
      const shiftId = key.substring(lastUnderscore + 1);
      const row = [{
        agent_id: STATE.user,
        date:     date,
        shift_id: shiftId,
        dispo:    val.dispo    || 'unavailable',
        doublon:  val.doublon  || 'unavailable'
      }];
      // Use direct fetch with full error details
      const r = await fetch(
        `${STATE.supabaseUrl}/rest/v1/availability?on_conflict=agent_id,date,shift_id`,
        {
          method: 'POST',
          headers: {
            'apikey': STATE.supabaseKey,
            'Authorization': 'Bearer ' + STATE.supabaseKey,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates'
          },
          body: JSON.stringify(row)
        }
      );
      if (!r.ok) {
        const errText = await r.text();
        firstErr = `HTTP ${r.status}: ${errText}`;
        console.error('Save error for', key, firstErr);
        break;
      }
      STATE.availability[`${STATE.user}_${date}_${shiftId}`] = {dispo: row[0].dispo, doublon: row[0].doublon};
      saved++;
    }
    STATE.syncing = false;
    if (firstErr) {
      showToast('Erreur Supabase: ' + firstErr, 'error');
    } else {
      await trackDispoUpdate(STATE.user, saved).catch(()=>{});
      STATE.dispoEdits = {};
      showToast(`✓ ${saved} disponibilité(s) enregistrée(s)`);
    }
    render();
  } catch(e) {
    STATE.syncing = false;
    showToast('Erreur réseau: ' + e.message, 'error');
    console.error('saveAll network error:', e);
    render();
  }
}

    // Find Sunday of last week
    const lastDay = days[days.length - 1];

// ── Week open/close helpers ────────────────────────────────────────────────
function weekKey(monday) {
  return toISO(monday); // e.g. "2026-07-06"
}

function isWeekOpen(monday) {
  return STATE.openWeeks.has(weekKey(monday));
}

async function toggleWeek(monday) {
  const key = weekKey(monday);
  if (STATE.openWeeks.has(key)) {
    STATE.openWeeks.delete(key);
  } else {
    STATE.openWeeks.add(key);
  }
  await saveOpenWeeks();
  render();
}

async function saveOpenWeeks() {
  const arr = [...STATE.openWeeks];
  try {
    await sbUpsert('settings', [{key: 'open_weeks', value: JSON.stringify(arr)}], 'key');
  } catch(e) {
    // Fallback to localStorage if settings table doesn't exist
    localStorage.setItem('open_weeks', JSON.stringify(arr));
  }
}

async function loadOpenWeeks() {
  try {
    const rows = await sbGet('settings', 'key=eq.open_weeks');
    if (rows.length > 0) {
      const arr = JSON.parse(rows[0].value || '[]');
      STATE.openWeeks = new Set(arr);
      return;
    }
  } catch(e) {}
  // Fallback to localStorage
  try {
    const local = localStorage.getItem('open_weeks');
    if (local) STATE.openWeeks = new Set(JSON.parse(local));
  } catch(e) {}
}

function autoOpenWeeks(days, weeks) {
  // Open weeks where at least 2 shifts per day are already assigned (on average)
  weeks.forEach(weekDays => {
    const monday = weekDays.find(d => d.getDay() === 1) || weekDays[0];
    let coveredDays = 0;
    weekDays.forEach(d => {
      const dateStr = toISO(d);
      let assignedCount = 0;
      SHIFT_DISPLAY_ORDER.forEach(shiftId => {
        const lookupDate = storageDate(dateStr, shiftId);
        const assigns = getAssignments(lookupDate, shiftId).filter(a=>a.type==='main');
        if (assigns.length > 0) assignedCount++;
      });
      if (assignedCount >= 2) coveredDays++;
    });
    const key = weekKey(monday);
    if (coveredDays >= Math.ceil(weekDays.length / 2)) {
      STATE.openWeeks.add(key);
    }
  });
  saveOpenWeeks();
  render();
}

// Check if a specific slot is demandable by agents
function isSlotOpen(dateStr, shiftId) {
  // Find the monday of this date's week
  const d = new Date(dateStr + 'T12:00:00');
  const monday = getMonday(d);
  return STATE.openWeeks.has(weekKey(monday));
}

// ===================== HELPERS =====================
function t(key) { return (TRANSLATIONS[STATE.lang] || TRANSLATIONS.fr)[key] || key; }

function toISO(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

function getMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

function get4WeekDays(startMonday) {
  const days = [];
  for (let i = 0; i < 28; i++) days.push(addDays(startMonday, i));
  return days;
}

function storageDate(displayDate, shiftId) {
  // No offset — agents and admin always use the same date
  // (Excel import legacy data had J-1 offset, but new app data uses display date)
  return displayDate;
}

const SHIFT_COLORS = {
  S4: {bg:'#ede9fe', border:'#c4b5fd', text:'#6d28d9', label:'00h–06h ★'},
  S1: {bg:'#dbeafe', border:'#93c5fd', text:'#1d4ed8', label:'06h–12h'},
  S2: {bg:'#fce7f3', border:'#f9a8d4', text:'#be185d', label:'12h–18h'},
  S3: {bg:'#d1fae5', border:'#6ee7b7', text:'#065f46', label:'18h–00h'},
};



function monthName(d) {
  const keys = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  return t(keys[d.getMonth()]);
}

function formatDate(dateStr) {
  const [y,m,d] = dateStr.split('-').map(Number);
  const days = [t('sun'),t('mon'),t('tue'),t('wed'),t('thu'),t('fri'),t('sat')];
  const date = new Date(y,m-1,d);
  return `${days[date.getDay()]} ${d} ${monthName(date)}`;
}

function shiftLabel(sid) {
  const map = {S1:t('shiftS1'),S2:t('shiftS2'),S3:t('shiftS3'),S4:t('shiftS4'),SOV:t('shiftSOV')};
  return map[sid] || sid;
}

function dispoLabel(d) {
  const map = {preferred:t('preferred'),maybe:t('maybe'),unavailable:t('unavailable'),ask:t('ask'),unknown:t('unknown')};
  return map[d] || d;
}

function getAgentDispo(date, shiftId, agentId) {
  const k = `${agentId}_${date}_${shiftId}`;
  return STATE.availability[k]?.dispo || 'unavailable';
}

function getSlotAgents(date, shiftId) {
  return STATE.agents.map(ag => {
    const k = `${ag.id}_${date}_${shiftId}`;
    const info = STATE.availability[k] || {dispo:'unavailable', doublon:'unavailable'};
    return {name: ag.id, ...info};
  });
}

function getAssignments(date, shiftId) {
  return STATE.assignments[`${date}_${shiftId}`] || [];
}

function setAssignment(date, shiftId, agent, type='main') {
  const key = `${date}_${shiftId}`;
  if (!STATE.assignments[key]) STATE.assignments[key] = [];
  const existing = STATE.assignments[key].findIndex(a => a.agent === agent && a.type === type);
  if (existing === -1) STATE.assignments[key].push({agent, type});
  STATE.pendingStatus = 'draft';
  updateNightCounts();
}

function removeAssignment(date, shiftId, agent, type='main') {
  const key = `${date}_${shiftId}`;
  STATE.assignments[key] = (STATE.assignments[key] || []).filter(a => !(a.agent === agent && a.type === type));
  STATE.pendingStatus = 'draft';
  updateNightCounts();
}

function updateNightCounts() {
  // Count S4 shifts per agent where display date falls in viewMonth
  STATE.nightCounts = {};
  const year  = STATE.viewMonth.getFullYear();
  const month = STATE.viewMonth.getMonth();
  const monthStart = new Date(year, month, 1);
  const monthEnd   = new Date(year, month + 1, 0);
  Object.entries(STATE.assignments).forEach(([key, agents]) => {
    if (!key.endsWith('_S4')) return;
    const dateStr = key.replace('_S4','');
    const d = new Date(dateStr + 'T12:00:00');
    if (d < monthStart || d > monthEnd) return;
    agents.filter(a=>a.type==='main').forEach(a => {
      STATE.nightCounts[a.agent] = (STATE.nightCounts[a.agent] || 0) + 1;
    });
  });
}

function hasConsecutive(agentName, date, shiftId) {
  const SHIFT_ORDER = ['S1','S2','S3','S4'];
  const idx = SHIFT_ORDER.indexOf(shiftId);
  if (idx < 0) return false;
  const prevShift = idx > 0 ? SHIFT_ORDER[idx-1] : null;
  const nextShift = idx < SHIFT_ORDER.length-1 ? SHIFT_ORDER[idx+1] : null;
  const prevKey = prevShift ? `${date}_${prevShift}` : null;
  const nextKey = nextShift ? `${date}_${nextShift}` : null;
  if (prevKey && (STATE.assignments[prevKey]||[]).some(a=>a.agent===agentName)) return true;
  if (nextKey && (STATE.assignments[nextKey]||[]).some(a=>a.agent===agentName)) return true;
  return false;
}

function getDaysInMonth(year, month) {
  const days = [];
  const d = new Date(year, month, 1);
  while (d.getMonth() === month) {
    days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function getMonthSlots(year, month) {
  const SHIFT_ORDER = ['S4','S1','S2','S3'];
  return Object.values(STATE.availData?.slots || {})
    .filter(s => {
      const [sy,sm] = s.date.split('-').map(Number);
      return sy === year && sm === month+1;
    })
    .sort((a,b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      return SHIFT_ORDER.indexOf(a.shift_id) - SHIFT_ORDER.indexOf(b.shift_id);
    });
}

function showToast(msg, type='success') {
  const id = Date.now();
  STATE.toasts.push({id, msg, type});
  render();
  setTimeout(() => {
    STATE.toasts = STATE.toasts.filter(t => t.id !== id);
    render();
  }, 3000);
}

// ===================== AUTO-GENERATE =====================
function autoGenerate() {
  if (!STATE.availData) return;
  const year  = STATE.viewMonth.getFullYear();
  const month = STATE.viewMonth.getMonth();
  const slots = getMonthSlots(year, month);

  // Clear existing assignments for this month
  slots.forEach(slot => {
    const lookup = storageDate(slot.date, slot.shift_id);
    delete STATE.assignments[`${lookup}_${slot.shift_id}`];
  });

  const agents = STATE.agents.filter(a => a.role !== 'admin').map(a => a.id);

  // Night equity: proportional to how many nights each agent offered
  const nightSlots = slots.filter(s => s.shift_id === 'S4');
  const nightAvailCount = {};
  agents.forEach(id => { nightAvailCount[id] = 0; });
  nightSlots.forEach(slot => {
    agents.forEach(id => {
      const agObj = STATE.agents.find(x=>x.id===id);
      if (agObj && agObj.no_night) return;
      const info = STATE.availability[`${id}_${slot.date}_${slot.shift_id}`];
      if (info && info.dispo !== 'unavailable') nightAvailCount[id]++;
    });
  });

  const totalNights = nightSlots.length;
  const totalOffered = Object.values(nightAvailCount).reduce((s,n)=>s+n,0);
  const nightTarget = {};
  agents.forEach(id => {
    nightTarget[id] = totalOffered > 0
      ? Math.round(totalNights * (nightAvailCount[id] / totalOffered))
      : 0;
  });
  const nightAssigned = {};
  agents.forEach(id => { nightAssigned[id] = 0; });
  const shiftCount = {};
  agents.forEach(id => { shiftCount[id] = 0; });

  const PRIORITY = {preferred:0, maybe:1, ask:5, unavailable:99}; // ask=orange, only last resort
  const SHIFT_ORDER_GEN = ['S4','S1','S2','S3'];

  const byDate = {};
  slots.forEach(s => {
    if (!byDate[s.date]) byDate[s.date] = [];
    byDate[s.date].push(s);
  });

  Object.keys(byDate).sort().forEach(date => {
    const daySlots = byDate[date].sort((a,b) =>
      SHIFT_ORDER_GEN.indexOf(a.shift_id) - SHIFT_ORDER_GEN.indexOf(b.shift_id)
    );
    daySlots.forEach(slot => {
      const isNight = slot.shift_id === 'S4';
      const lookupDate = storageDate(date, slot.shift_id);
      const key = `${lookupDate}_${slot.shift_id}`;

      const candidates = agents
        .map(id => {
          const info = STATE.availability[`${id}_${slot.date}_${slot.shift_id}`]
                    || STATE.availability[`${id}_${lookupDate}_${slot.shift_id}`]
                    || {dispo:'unavailable', doublon:'unavailable'};
          return {id, dispo: info.dispo, doublon: info.doublon};
        })
        .filter(a => {
          // Seuls les agents ayant encodé une dispo (preferred/maybe/ask minimum)
          // sont proposés. Si pas de dispo ou indisponible → jamais proposé.
          if (!a.dispo || a.dispo === 'unavailable') return false;
          // Exclure agents sans nuits
          if (isNight) {
            const agObj = STATE.agents.find(x=>x.id===a.id);
            if (agObj && agObj.no_night) return false;
          }
          return true;
        });

      if (!candidates.length) return;

      candidates.sort((a, b) => {
        const pa = PRIORITY[a.dispo] ?? 99;
        const pb = PRIORITY[b.dispo] ?? 99;
        if (pa !== pb) return pa - pb;
        if (isNight) {
          const aBelowTarget = nightAssigned[a.id] < nightTarget[a.id];
          const bBelowTarget = nightAssigned[b.id] < nightTarget[b.id];
          if (aBelowTarget !== bBelowTarget) return aBelowTarget ? -1 : 1;
          if (nightAssigned[a.id] !== nightAssigned[b.id])
            return nightAssigned[a.id] - nightAssigned[b.id];
        }
        return (shiftCount[a.id]||0) - (shiftCount[b.id]||0);
      });

      let assigned = false;
      for (const ag of candidates) {
        if (!hasConsecutive(ag.id, date, slot.shift_id)) {
          setAssignment(lookupDate, slot.shift_id, ag.id);
          shiftCount[ag.id]++;
          if (isNight) nightAssigned[ag.id]++;
          assigned = true;
          break;
        }
      }
      if (!assigned) {
        setAssignment(lookupDate, slot.shift_id, candidates[0].id);
        shiftCount[candidates[0].id]++;
        if (isNight) nightAssigned[candidates[0].id]++;
      }

      // Doublon 19h-21h (S3 only)
      if (slot.shift_id === 'S3') {
        const dl = agents.find(id => {
          const info = STATE.availability[`${id}_${slot.date}_S3`];
          return info && (info.doublon==='preferred'||info.doublon==='maybe')
            && !(STATE.assignments[key]||[]).some(a=>a.agent===id&&a.type==='main');
        });
        if (dl) setAssignment(lookupDate, slot.shift_id, dl, 'doublon');
      }
    });
  });

  const nightSummary = agents
    .filter(id => nightAssigned[id] > 0)
    .map(id => `${displayName(id).split(' ')[0]}: ${nightAssigned[id]}`)
    .join(', ');

  updateNightCounts();
  STATE.pendingStatus = 'draft';
  showToast(`Planning généré ✓ — Nuits : ${nightSummary||'aucune'}`, 'success');
  render();
}

// ===================== EXPORT CSV =====================
function exportCSV() {
  const year = STATE.viewMonth.getFullYear();
  const month = STATE.viewMonth.getMonth();
  const slots = getMonthSlots(year, month);
  
  let csv = 'Date,Shift,Heure,Agent,Type\n';
  slots.forEach(slot => {
    const assigns = getAssignments(slot.date, slot.shift_id);
    if (assigns.length === 0) {
      csv += `${slot.date},${slot.shift_id},${slot.shift_label},NON COUVERT,main\n`;
    } else {
      assigns.forEach(a => {
        csv += `${slot.date},${slot.shift_id},${slot.shift_label},${a.agent},${a.type}\n`;
      });
    }
  });
  
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Planning_Calliomed_${monthName(STATE.viewMonth)}_${year}.csv`;
  a.click();
  showToast(t('exportDone'), 'success');
}

// ===================== RENDER HELPERS =====================
function el(tag, props={}, ...children) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'value') e._pendingValue = v; // set after children appended
    else if (k === 'checked') e.checked = !!v;
    else if (v === null || v === undefined) {}
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  if (e._pendingValue !== undefined) { e.value = e._pendingValue; delete e._pendingValue; }
  return e;
}

function badge(cls, text) { return el('span', {class:`badge badge-${cls}`}, text); }

function dispoColor(d) {
  if (d === 'preferred') return 'green';
  if (d === 'maybe') return 'yellow';
  if (d === 'unavailable') return 'red';
  if (d === 'ask') return 'orange';
  return 'gray';
}

// ===================== MODAL =====================
function renderModal() {
  if (!STATE.modal) return null;
  const m = STATE.modal;
  
  if (m.type === 'assign') {
    const agents = getSlotAgents(m.date, m.shiftId);
    const current = getAssignments(m.date, m.shiftId);
    const isS3 = m.shiftId === 'S3'; // Only S3 has doublon 19h-21h

    function agentRow(ag, type) {
      const isAssigned = current.some(a => a.agent === ag.name && a.type === type);
      const isUnavail = type === 'main' ? ag.dispo === 'unavailable' : (ag.doublon === 'unavailable' || ag.doublon === 'unknown');
      const isConsec = type === 'main' && hasConsecutive(ag.name, m.date, m.shiftId);
      const dispoBadge = type === 'main'
        ? el('span',{class:`badge badge-${dispoColor(ag.dispo)}`}, dispoLabel(ag.dispo))
        : el('span',{style:{fontSize:'10px',background:'#ede9fe',color:'#6d28d9',padding:'1px 6px',borderRadius:'99px',border:'1px solid #c4b5fd'}},
            ag.doublon && ag.doublon !== 'unavailable' && ag.doublon !== 'unknown'
              ? '↻ ' + dispoLabel(ag.doublon)
              : '↻ non dispo');

      return el('div',{
        class: `agent-option${isAssigned?' selected':''} ${type==='main'?ag.dispo:'preferred'}`,
        style:{
          opacity: isUnavail && !isAssigned ? '0.45' : '1',
          borderColor: type==='doublon' ? (isAssigned?'#6d28d9':'#ddd6fe') : '',
          background: type==='doublon' && isAssigned ? '#ede9fe' : ''
        },
        onClick: () => {
          if (isAssigned) {
            removeAssignment(m.date, m.shiftId, ag.name, type);
            dbRemoveAssignment(m.date, m.shiftId, ag.name, type).catch(e=>showToast(e.message,'error'));
          } else {
            setAssignment(m.date, m.shiftId, ag.name, type);
            dbSetAssignment(m.date, m.shiftId, ag.name, type).catch(e=>showToast(e.message,'error'));
          }
          render();
        }
      },
        el('div',{class:'agent-name'},
          displayName(ag.name),
          isConsec ? el('span',{style:{color:'var(--orange)',fontSize:'10px',marginLeft:'4px'}},' ⚠') : null,
          isUnavail ? el('span',{style:{color:'var(--text3)',fontSize:'10px',marginLeft:'4px'}},' (indispo)') : null
        ),
        el('div',{class:'agent-dispo'}, dispoBadge)
      );
    }

    const sortedAgents = [...agents].sort((a,b) => {
      const pa = current.some(x=>x.agent===a.name) ? 0 : 1;
      const pb = current.some(x=>x.agent===b.name) ? 0 : 1;
      if (pa!==pb) return pa-pb;
      const prio = {preferred:0,maybe:1,ask:2,unavailable:3};
      return (prio[a.dispo]||3)-(prio[b.dispo]||3);
    });

    return el('div', {class:'modal-overlay', onClick: e => { if(e.target===e.currentTarget){STATE.modal=null;render();} }},
      el('div', {class:'modal', style:{width:'520px'}},
        el('div', {class:'modal-title'}, `${t('assignAgent')} — ${formatDate(m.date)} ${shiftLabel(m.shiftId)}`),

        // ── Main shift section ────────────────────────────────────────────
        el('div',{style:{fontSize:'12px',fontWeight:'600',color:'var(--text2)',marginBottom:'6px',marginTop:'4px'}},
          '👤 Shift principal'),
        el('div', {class:'agent-grid'}, ...sortedAgents.map(ag => agentRow(ag, 'main'))),

        // ── Doublon section (S3 only) ─────────────────────────────────────
        isS3 ? el('div',{},
          el('div',{style:{
            fontSize:'12px',fontWeight:'600',color:'#6d28d9',
            marginBottom:'6px',marginTop:'14px',
            borderTop:'1px solid #ede9fe',paddingTop:'10px'
          }}, '↻ Doublon 19h–21h (indépendant du shift principal)'),
          el('div', {class:'agent-grid'}, ...sortedAgents.map(ag => agentRow(ag, 'doublon')))
        ) : null,

        el('div', {class:'modal-footer'},
          el('button', {class:'btn btn-secondary', onClick:()=>{STATE.modal=null;render();}}, t('close')),
          el('button', {class:'btn btn-primary', onClick:()=>{STATE.modal=null;showToast(t('shiftAssigned'));render();}}, t('save'))
        )
      )
    );
  }
  
  if (m.type === 'reject') {
    let reason = '';
    return el('div', {class:'modal-overlay'},
      el('div', {class:'modal'},
        el('div', {class:'modal-title'}, t('rejectShift')),
        el('p', {style:{fontSize:'13px',color:'var(--text2)',marginBottom:'12px'}}, 
          `${formatDate(m.shiftId==='S4' ? toISO(addDays(new Date(m.date+'T12:00:00'),1)) : m.date)} — ${shiftLabel(m.shiftId)}`),
        el('div', {class:'field'},
          el('label', {}, t('rejectReason')),
          el('input', {type:'text', placeholder:'...', onInput: e => reason = e.target.value, style:{width:'100%',padding:'8px 10px',border:'1px solid var(--border2)',borderRadius:'var(--radius)',fontSize:'13px'}})
        ),
        el('div', {class:'modal-footer'},
          el('button', {class:'btn btn-secondary', onClick:()=>{STATE.modal=null;render();}}, t('cancel')),
          el('button', {class:'btn btn-danger', onClick:()=>{
            dbAddRequest('reject',STATE.user,m.date,m.shiftId,reason).then(()=>{STATE.modal=null;showToast(t('requestSent'),'info');render();}).catch(e=>showToast(e.message,'error'));
          }}, t('reject'))
        )
      )
    );
  }


  if (m.type === 'confirm-send') {
    const year  = STATE.viewMonth.getFullYear();
    const month = STATE.viewMonth.getMonth();
    const MONTH_KEYS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const monthLabel = t(MONTH_KEYS[month]) + ' ' + year;
    const SHIFT_LABELS = {S4:'00h–06h ★', S1:'06h–12h', S2:'12h–18h', S3:'18h–00h'};

    const agentSummaries = STATE.agents
      .filter(a => a.role !== 'admin')
      .map(ag => {
        const shifts = Object.entries(STATE.assignments)
          .flatMap(([key, assigns]) => {
            const mine = assigns.filter(a => a.agent === ag.id && a.type === 'main');
            if (!mine.length) return [];
            const parts = key.split('_');
            const shiftId = parts[parts.length-1];
            const storedDate = parts.slice(0,-1).join('_');
            const [sy,sm] = storedDate.split('-').map(Number);
            if (sy !== year || sm !== month+1) return [];
            const displayDate = shiftId === 'S4'
              ? toISO(addDays(new Date(storedDate+'T12:00:00'), 1))
              : storedDate;
            return [{displayDate, shiftId}];
          })
          .sort((a,b) => a.displayDate.localeCompare(b.displayDate));
        return {ag, shifts};
      });

    if (!STATE.modal.selected) {
      STATE.modal.selected = new Set(
        agentSummaries
          .filter(({ag,shifts}) => shifts.length > 0 && AGENT_EMAILS[ag.id]?.email)
          .map(({ag}) => ag.id)
      );
    }
    const selected = STATE.modal.selected;

    return el('div', {class:'modal-overlay'},
      el('div', {class:'modal', style:{width:'580px',maxHeight:'82vh',overflowY:'auto'}},
        el('div', {class:'modal-title'}, '✉️ Envoyer le planning ' + monthLabel),
        el('div', {class:'alert alert-info', style:{marginBottom:'12px'}},
          "Cochez/décochez les agents à inclure. Chaque agent ne voit que ses propres shifts."
        ),
        el('div', {style:{display:'flex',gap:'8px',marginBottom:'12px',alignItems:'center'}},
          el('button', {class:'btn btn-secondary', style:{fontSize:'11px',padding:'4px 10px'},
            onClick:()=>{ agentSummaries.forEach(({ag,shifts})=>{ if(shifts.length>0&&AGENT_EMAILS[ag.id]?.email) selected.add(ag.id); }); render(); }
          }, 'Tout sélectionner'),
          el('button', {class:'btn btn-secondary', style:{fontSize:'11px',padding:'4px 10px'},
            onClick:()=>{ selected.clear(); render(); }
          }, 'Tout désélectionner'),
          el('span', {style:{fontSize:'12px',color:'var(--text3)'}}, selected.size + ' agent(s) sélectionné(s)')
        ),
        ...agentSummaries.map(({ag, shifts}) => {
          const nights   = shifts.filter(s=>s.shiftId==='S4').length;
          const hasEmail = !!AGENT_EMAILS[ag.id]?.email;
          const isSel    = selected.has(ag.id);
          return el('div', {style:{
            marginBottom:'8px', padding:'10px 12px',
            border:'1px solid ' + (isSel ? 'var(--green-border)' : 'var(--border)'),
            borderRadius:'var(--radius)',
            background: isSel ? '#f0fdf4' : shifts.length===0 ? '#fafafa' : 'var(--surface)',
            opacity: hasEmail ? '1' : '0.55'
          }},
            el('div', {style:{display:'flex',alignItems:'center',gap:'10px'}},
              el('input', {
                type:'checkbox',
                checked: isSel ? 'true' : null,
                disabled: !hasEmail ? 'true' : null,
                style:{width:'16px',height:'16px',cursor:hasEmail?'pointer':'not-allowed',flexShrink:'0'},
                onChange: e => { if(e.target.checked) selected.add(ag.id); else selected.delete(ag.id); render(); }
              }),
              el('div', {style:{flex:'1'}},
                el('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}},
                  el('span', {style:{fontWeight:'600',fontSize:'13px'}}, ag.display_name),
                  el('div', {style:{display:'flex',gap:'5px',alignItems:'center'}},
                    el('span', {style:{fontSize:'11px',background:'var(--blue-bg)',color:'var(--accent)',padding:'1px 7px',borderRadius:'99px',border:'1px solid var(--blue-border)'}}, shifts.length + ' shift(s)'),
                    nights > 0 ? el('span', {style:{fontSize:'11px',background:'var(--purple-bg)',color:'var(--purple)',padding:'1px 7px',borderRadius:'99px',border:'1px solid #c4b5fd'}}, '🌙 ' + nights) : null,
                    el('span', {style:{fontSize:'10px',color:hasEmail?'var(--text3)':'var(--red)'}}, hasEmail ? AGENT_EMAILS[ag.id].email : '⚠️ pas d\'email')
                  )
                ),
                shifts.length > 0
                  ? el('div', {style:{display:'flex',flexWrap:'wrap',gap:'3px'}},
                      ...shifts.map(s => {
                        const d  = new Date(s.displayDate+'T12:00:00');
                        const sc = {S4:'#ede9fe',S1:'#dbeafe',S2:'#fce7f3',S3:'#d1fae5'}[s.shiftId]||'#f0f0f0';
                        const tc = {S4:'#6d28d9',S1:'#1d4ed8',S2:'#be185d',S3:'#065f46'}[s.shiftId]||'#333';
                        return el('span',{style:{fontSize:'10px',padding:'2px 6px',borderRadius:'4px',background:sc,color:tc,fontWeight:'500'}},
                          d.getDate()+' '+SHIFT_LABELS[s.shiftId]);
                      })
                    )
                  : el('span', {style:{fontSize:'11px',color:'var(--text3)',fontStyle:'italic'}}, 'Aucun shift ce mois-ci')
              )
            )
          );
        }),
        el('div', {class:'modal-footer'},
          el('button', {class:'btn btn-secondary', onClick:()=>{STATE.modal=null;render();}}, t('cancel')),
          el('button', {
            class: selected.size > 0 ? 'btn btn-success' : 'btn btn-secondary',
            style: {opacity: selected.size > 0 ? '1' : '0.5'},
            onClick: selected.size > 0 ? async () => {
              const toSend = [...selected];
              STATE.modal = null;
              STATE.pendingStatus = 'validated';
              await sendPlanningToAgents(toSend).catch(e=>showToast('Erreur email: '+e.message,'error'));

            } : null

  if (m.type === 'welcome-email') {

      .replace(/{{prenom}}/g, _ag.display_name.split(' ')[0])
      .replace(/{{nom}}/g, _ag.display_name.split(' ').slice(1).join(' ') || '')
      .replace(/{{mot_de_passe}}/g, m.pwd || '(mot de passe initial)')
      .replace(/{{lien_app}}/g, window.location.href.split('?')[0]);
    return el('div', {class:'modal-overlay'},
      el('div', {class:'modal', style:{width:'480px',maxHeight:'80vh',overflowY:'auto'}},
        el('div', {class:'modal-title'}, '🎉 Compte créé — ' + _ag.display_name),
        _hasMail
          ? el('div',{class:'alert alert-success',style:{marginBottom:'12px'}},
              '✅ Email prêt pour : ' + _ag.email)

              "⚠️ Pas d'email — envoi impossible."),
        el('div',{style:{
          background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'var(--radius)',
          padding:'10px',marginBottom:'12px',fontSize:'11px',fontFamily:'monospace',
          lineHeight:'1.6',color:'var(--text2)',whiteSpace:'pre-wrap',
          maxHeight:'180px',overflowY:'auto'
        }}, _preview),
        el('div',{class:'modal-footer'},
          el('button',{class:'btn btn-secondary',onClick:()=>{STATE.modal=null;render();}},
            'Fermer sans envoyer'),
          _hasMail ? el('button',{class:'btn btn-primary',onClick: async ()=>{
            try {
              const _html = _preview.split('\n').join('<br>');
              const _subj = _tpl.subject
                .replace(/{{prenom}}/g, _ag.display_name.split(' ')[0])
                .replace(/{{nom}}/g, _ag.display_name)
                .replace(/{{mot_de_passe}}/g, m.pwd||'')
                .replace(/{{lien_app}}/g, window.location.href.split('?')[0]);
              await sendBrevoEmail({email:_ag.email,name:_ag.display_name},_subj,
                `<div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px">${_html}</div>`);
              showToast('Email de bienvenue envoyé à ' + _ag.email);
              STATE.modal=null; render();
            } catch(e){showToast('Erreur: '+e.message,'error');}
          }}, "✉️ Envoyer l'email de bienvenue") : null
        )
      )
    );
  }

  if (m.type === 'confirm-remove') {
    return el('div', {class:'modal-overlay'},
      el('div', {class:'modal'},
        el('div', {class:'modal-title'}, t('removeAssignment')),
        el('p', {style:{fontSize:'13px',color:'var(--text2)',marginBottom:'12px'}}, t('confirmRemove')),
        el('p', {style:{fontWeight:'600',marginBottom:'4px'}}, m.agent),
        el('p', {style:{fontSize:'12px',color:'var(--text3)'}}, `${formatDate(m.date)} — ${shiftLabel(m.shiftId)}`),
        el('div', {class:'modal-footer'},
          el('button', {class:'btn btn-secondary', onClick:()=>{STATE.modal=null;render();}}, t('cancel')),
          el('button', {class:'btn btn-danger', onClick:()=>{
            removeAssignment(m.date, m.shiftId, m.agent, m.agentType);
            dbRemoveAssignment(m.date, m.shiftId, m.agent, m.agentType).catch(e=>showToast(e.message,'error'));
            STATE.modal=null;
            showToast(t('shiftRemoved'),'info');
            render();
          }}, t('confirm'))
        )
      )
    );
  }
  
  return null;
}

// ===================== LOGIN PAGE =====================
function renderLogin() {
  const agents = STATE.agents.length ? STATE.agents : [];
  let selectedUser = agents[0]?.id || '';
  let password = '';
  let loginError = STATE.loginError || '';

  async function doLogin() {
    if (!selectedUser || !password) {
      STATE.loginError = 'Veuillez sélectionner un nom et entrer votre mot de passe.';
      render(); return;
    }
    const agentObj = agents.find(a => a.id === selectedUser);
    if (!agentObj) { STATE.loginError = 'Agent introuvable.'; render(); return; }

    // Hash the entered password and compare
    const entered = await hashPassword(password);

    // If agent has no pwd_hash yet (first connection before seed ran), allow and set hash
    if (!agentObj.pwd_hash) {
      STATE.loginError = "Compte non configuré. Contactez l'administrateur.";
      render(); return;
    }

    if (entered !== agentObj.pwd_hash) {
      STATE.loginError = 'Mot de passe incorrect.';
      render(); return;
    }

    STATE.loginError = '';
    STATE.user = selectedUser;
    STATE.role = agentObj.role || 'agent';
    localStorage.setItem('sb_user', selectedUser);
    STATE.page = STATE.role === 'admin' ? 'planning' : 'myshifts';
    render();
  }

  return el('div', {class:'login-screen'},
    el('div', {class:'login-card'},
      el('div', {class:'login-logo'},
        el('h1', {}, '🏥 Calliomed'),
        el('p', {}, t('appSub'))
      ),

      el('div', {class:'field'},
        el('label', {}, t('selectUser')),
        el('select', {
          onChange: e => { selectedUser = e.target.value; STATE.loginError=''; },
        },
          ...agents.map(a => el('option', {value:a.id}, a.display_name))
        )
      ),

      el('div', {class:'field'},
        el('label', {}, 'Mot de passe'),
        el('input', {
          type: 'password',
          placeholder: '••••••••',
          onInput: e => { password = e.target.value; STATE.loginError=''; },
          onKeydown: e => { if(e.key==='Enter') doLogin(); },
          style:{width:'100%',padding:'9px 12px',border:'1px solid var(--border2)',borderRadius:'var(--radius)',fontSize:'14px',background:'var(--bg)',color:'var(--text)'}
        })
      ),

      loginError ? el('div', {class:'alert alert-danger', style:{marginBottom:'12px'}}, '⚠️ ' + loginError) : null,

      el('div', {style:{marginBottom:'16px'}},
        el('select', {class:'lang-select', onChange: e => {STATE.lang=e.target.value;localStorage.setItem('sb_lang',e.target.value);render();}},
          el('option',{value:'fr',selected:STATE.lang==='fr'?'true':null},'🇫🇷 Français'),
          el('option',{value:'en',selected:STATE.lang==='en'?'true':null},'🇬🇧 English'),
          el('option',{value:'nl',selected:STATE.lang==='nl'?'true':null},'🇧🇪 Nederlands')
        )
      ),

      el('button', {class:'btn btn-primary btn-full', onClick: doLogin}, t('connect')),

      el('div', {style:{marginTop:'12px',fontSize:'11px',color:'var(--text3)',textAlign:'center'}},
        'Mot de passe oublié ? Contactez votre administrateur.'
      )
    )
  );
}

// ===================== PLANNING PAGE (ADMIN) =====================
function renderPlanning() {
  const year = STATE.viewMonth.getFullYear();
  const month = STATE.viewMonth.getMonth();
  const days = getDaysInMonth(year, month);
  const SHIFTS = ['S4','S1','S2','S3'];
  const SHIFT_NAMES = {S4:'00h–06h ★',S1:'06h–12h',S2:'12h–18h',S3:'18h–00h'};
  const SHIFT_COLORS_ADMIN = {
    S4:{text:'var(--purple)',bg:'#faf5ff'},
    S1:{text:'var(--accent)',bg:'#eff6ff'},
    S2:{text:'#be185d',bg:'#fdf2f8'},
    S3:{text:'var(--green)',bg:'#f0fdf4'},
  };

  // Split days into weeks (Mon-Sun)
  const weeks = [];
  let week = [];
  days.forEach(d => {
    // Start new week on Monday (or first day of month)
    if (d.getDay() === 1 && week.length > 0) {
      weeks.push(week);
      week = [];
    }
    week.push(d);
  });
  if (week.length > 0) weeks.push(week);

  const prevMonth = () => { STATE.viewMonth = new Date(year, month-1, 1); render(); };
  const nextMonth = () => { STATE.viewMonth = new Date(year, month+1, 1); render(); };

  const slots = getMonthSlots(year, month);
  const totalSlots = slots.length;
  const coveredSlots = slots.filter(s => getAssignments(storageDate(s.date,s.shift_id),s.shift_id).length > 0).length;
  const uncoveredSlots = totalSlots - coveredSlots;
  // S4 display date = stored date + 1 day
  // For month M: display dates are 1st to last day of M
  // So stored dates run from last day of M-1 to second-to-last day of M
  const monthStart = new Date(year, month, 1);
  const monthEnd   = new Date(year, month + 1, 0);
  const nightSlots = Object.entries(STATE.assignments)
    .filter(([k]) => {
      if (!k.endsWith('_S4')) return false;
      const dateStr = k.replace('_S4','');
      const d = new Date(dateStr + 'T12:00:00');
      return d >= monthStart && d <= monthEnd;
    })
    .reduce((n,[,v]) => n + v.filter(a=>a.type==='main').length, 0);

  const DAY_NAMES = ['dim','lun','mar','mer','jeu','ven','sam'];
  const MONTH_KEYS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];

  function renderWeek(weekDays) {
    const weekLabel = `Semaine du ${weekDays[0].getDate()} ${t(MONTH_KEYS[weekDays[0].getMonth()])}`;

    // Find Monday for this week
    const weekMonday = weekDays.find(d => d.getDay() === 1) || weekDays[0];
    const weekOpen = isWeekOpen(weekMonday);

    // Header row for this week
    const header = el('div', {style:{
      display:'grid',
      gridTemplateColumns:`90px repeat(${weekDays.length}, 1fr)`,
      background: weekOpen ? '#f0fdf4' : 'var(--bg)',
      borderBottom:'1px solid var(--border)',
      borderTop: weekOpen ? '2px solid var(--green-border)' : '2px solid var(--border2)',
      marginTop:'12px'
    }},
      el('div',{style:{padding:'5px 8px',fontSize:'10px',fontWeight:'600',color:'var(--text3)',
        textTransform:'uppercase',letterSpacing:'0.5px',display:'flex',alignItems:'center',gap:'8px'}},
        weekLabel,
        el('button',{
          style:{
            fontSize:'10px', padding:'2px 8px', borderRadius:'99px', cursor:'pointer',
            background: weekOpen ? 'var(--green-bg)' : 'var(--red-bg)',
            color: weekOpen ? 'var(--green)' : 'var(--red)',
            border: `1px solid ${weekOpen ? 'var(--green-border)' : 'var(--red-border)'}`,
            fontWeight:'600', whiteSpace:'nowrap'
          },
          onClick: e => { e.stopPropagation(); toggleWeek(weekMonday); }
        }, weekOpen ? '🔓 Ouverte aux demandes' : '🔒 Fermée')
      ),
      ...weekDays.map(d => {
        const isWE = d.getDay()===0||d.getDay()===6;
        const isToday = toISO(d) === toISO(new Date());
        return el('div',{style:{
          padding:'5px 4px', textAlign:'center',
          background: isToday?'var(--accent-light)': isWE?'#f8f8f6':'transparent'
        }},
          el('div',{style:{fontSize:'10px',textTransform:'uppercase',letterSpacing:'0.4px',
            color:isToday?'var(--accent)':isWE?'var(--accent)':'var(--text3)'
          }}, DAY_NAMES[d.getDay()]),
          el('div',{style:{
            fontSize:'14px',fontWeight:'700',
            width:'24px',height:'24px',borderRadius:'50%',
            background:isToday?'var(--accent)':'transparent',
            color:isToday?'#fff':isWE?'var(--accent)':'var(--text)',
            display:'flex',alignItems:'center',justifyContent:'center',margin:'2px auto 0'
          }}, String(d.getDate()))
        );
      })
    );

    // Shift rows
    const shiftRows = SHIFTS.map(shiftId => {
      const sc = SHIFT_COLORS_ADMIN[shiftId];
      const isNight = shiftId === 'S4';
      return el('div',{style:{
        display:'grid',
        gridTemplateColumns:`90px repeat(${weekDays.length}, 1fr)`,
        borderBottom:'1px solid var(--border)',
        minHeight:'44px'
      }},
        // Shift label
        el('div',{style:{
          padding:'4px 8px', display:'flex', alignItems:'center',
          borderRight:'1px solid var(--border)',
          background:sc.bg
        }},
          el('span',{style:{fontSize:'10px',fontWeight:'700',color:sc.text,letterSpacing:'0.3px'}},
            SHIFT_NAMES[shiftId])
        ),
        // Day cells
        ...weekDays.map(d => {
          const dateStr = toISO(d);
          const slot = STATE.availData?.slots[`${dateStr}_${shiftId}`];
          const lookupDate = storageDate(dateStr, shiftId);
          const isWE = d.getDay()===0||d.getDay()===6;
          const isToday = dateStr === toISO(new Date());

          if (!slot && !STATE.availData?.slots[`${lookupDate}_${shiftId}`]) {
            return el('div',{style:{
              borderRight:'1px solid var(--border)',
              background:isWE?'#f8f8f6':'transparent'
            }});
          }

          const assigns = getAssignments(lookupDate, shiftId);
          const mainAssigns = assigns.filter(a=>a.type==='main');
          const doublonAssigns = assigns.filter(a=>a.type==='doublon');

          return el('div',{
            style:{
              padding:'2px 3px', borderRight:'1px solid var(--border)',
              background:isToday?'#f8fbff':isWE?'#f8f8f6':'transparent',
              cursor:'pointer', verticalAlign:'top', minHeight:'40px'
            },
            onClick: () => {STATE.modal={type:'assign',date:lookupDate,shiftId};render();}
          },
            mainAssigns.length > 0
              ? mainAssigns.map(a => {
                  const dispo = getAgentDispo(lookupDate, shiftId, a.agent);
                  const bg = dispo==='preferred'?'var(--green-bg)':dispo==='maybe'?'var(--yellow-bg)':'var(--blue-bg)';
                  const tc = dispo==='preferred'?'var(--green)':dispo==='maybe'?'var(--yellow)':'var(--accent)';
                  const bd = dispo==='preferred'?'var(--green-border)':dispo==='maybe'?'var(--yellow-border)':'var(--blue-border)';
                  const isConsec = hasConsecutive(a.agent, dateStr, shiftId);
                  return el('div',{
                    style:{background:bg,color:tc,borderRadius:'4px',padding:'2px 5px',
                      fontSize:'10px',fontWeight:'500',marginBottom:'2px',
                      border:`1px solid ${bd}`,display:'flex',alignItems:'center',gap:'2px'},
                    title: displayName(a.agent)+(isConsec?' ⚠ consécutif':'')
                  },
                    shortName(a.agent),
                    isConsec ? el('span',{style:{color:'var(--orange)',fontSize:'9px'}},'⚠') : null
                  );
                })
              : el('div',{style:{
                  color:'var(--red)',fontSize:'10px',padding:'2px 3px',
                  border:'1px dashed var(--red-border)',borderRadius:'4px',
                  background:'var(--red-bg)',textAlign:'center',margin:'2px'
                }},'—'),
            doublonAssigns.length > 0
              ? doublonAssigns.map(a =>
                  el('div',{style:{
                    background:'var(--purple-bg)',color:'var(--purple)',
                    borderRadius:'4px',padding:'1px 4px',fontSize:'9px',
                    fontWeight:'500',border:'1px solid #c4b5fd',marginTop:'1px'
                  }}, shortName(a.agent)+'↻')
                )
              : null,
            // Pending claim requests — shown in pink/magenta
            (() => {
              const pendingClaims = STATE.requests.filter(r =>
                r.type === 'claim' && r.status === 'pending' &&
                r.date === lookupDate && r.shiftId === shiftId
              );
              if (!pendingClaims.length) return null;
              return pendingClaims.map(r => {
                const alreadyAssigned = mainAssigns.some(a => a.agent === r.agent);
                const isDoublon = doublonAssigns.some(a => a.agent === r.agent);
                const isConflict = alreadyAssigned || isDoublon;
                return el('div',{
                  style:{
                    background: isConflict ? '#fff0f6' : '#fdf2f8',
                    color: '#c2185b',
                    borderRadius:'4px', padding:'2px 5px',
                    fontSize:'10px', fontWeight:'600',
                    border:'1px solid #f48fb1',
                    marginTop:'2px',
                    display:'flex', alignItems:'center', justifyContent:'space-between', gap:'4px',
                    boxShadow: isConflict ? '0 0 0 1.5px #e91e63' : 'none'
                  },
                  title: displayName(r.agent) + ' — demande en attente' + (isConflict ? ' ⚠ DOUBLON' : '')
                },
                  el('span',{}, '📩 ' + shortName(r.agent) + (isConflict?' ⚠':'')),
                  el('span',{style:{display:'flex',gap:'2px'}},
                    el('button',{
                      style:{fontSize:'9px',padding:'1px 4px',borderRadius:'3px',border:'1px solid #86efac',background:'#dcfce7',color:'#15803d',cursor:'pointer',fontWeight:'700'},
                      onClick: async e => {
                        e.stopPropagation();
                        const req = STATE.requests.find(x=>x.id===r.id);
                        if (!req) return;
                        await dbUpdateRequest(req.id,'approved');
                        setAssignment(req.date, req.shiftId, req.agent);
                        await dbSetAssignment(req.date, req.shiftId, req.agent);
                        showToast(t('requestApproved'));
                        render();
                      }
                    },'✓'),
                    el('button',{
                      style:{fontSize:'9px',padding:'1px 4px',borderRadius:'3px',border:'1px solid #fca5a5',background:'#fee2e2',color:'#b91c1c',cursor:'pointer',fontWeight:'700'},
                      onClick: async e => {
                        e.stopPropagation();
                        const req = STATE.requests.find(x=>x.id===r.id);
                        if (!req) return;
                        await dbUpdateRequest(req.id,'rejected');
                        showToast(t('requestRejected'),'info');
                        render();
                      }
                    },'✗')
                  )
                );
              });
            })()
          );
        })
      );
    });

    return el('div',{}, header, ...shiftRows);
  }

  return el('div', {},
    el('div', {class:'page-header'},
      el('div', {},
        el('div', {class:'page-title'}, t('planning')),
        el('div', {class:'page-subtitle'}, t('adminPanel'))
      ),
      el('div', {class:'header-actions'},
        el('button',{class:'btn btn-secondary',style:{fontSize:'12px'},
          onClick:()=>{sendDispoRequests().catch(e=>showToast('Erreur: '+e.message,'error'));}},'✉️ Demander dispos'),
        STATE.pendingStatus === 'draft' ? el('button',{class:'btn btn-secondary',onClick:autoGenerate},'⚡ '+t('generate')) : null,
        STATE.pendingStatus === 'draft' ? el('button',{class:'btn btn-secondary',onClick:()=>{
              STATE.pendingStatus='pending';
              showToast(t('pendingValidation'),'info');
              render();
            }},t('sendForValidation')) : null,
        STATE.pendingStatus === 'pending' ? el('button',{class:'btn btn-success',onClick:()=>{
              STATE.modal={type:'confirm-send'}; render();
            }},t('validate')) : null,
        el('button',{class:'btn btn-secondary',style:{fontSize:'12px',position:'relative'},onClick: async ()=>{
          showToast('Actualisation...','info');
          await loadAllData();
          showToast('Planning actualisé ✓');
          render();
        }},
          '🔄',
          STATE.requests.filter(r=>r.status==='pending').length > 0
            ? el('span',{style:{
                position:'absolute',top:'-4px',right:'-4px',
                background:'var(--red)',color:'#fff',
                fontSize:'9px',fontWeight:'700',
                width:'14px',height:'14px',borderRadius:'50%',
                display:'flex',alignItems:'center',justifyContent:'center'
              }}, String(STATE.requests.filter(r=>r.status==='pending').length))
            : null
        ),

          autoOpenWeeks(days, weeks);

        }}, '🔓 Ouvrir auto'),
        el('button',{class:'btn btn-secondary',onClick:exportCSV},'⬇ '+t('export'))
      )
    ),

    STATE.pendingStatus === 'pending' ? el('div',{class:'alert alert-warn'},'⚠️ '+t('planningPending')) : null,
    STATE.pendingStatus === 'validated' ? el('div',{class:'alert alert-success'},'✅ '+t('planningValidated')) : null,

    el('div', {class:'stats-row'},
      el('div',{class:'stat-card'},el('div',{class:'stat-label'},t('shiftCount')),el('div',{class:'stat-value'},String(coveredSlots)),el('div',{class:'stat-sub'},`/ ${totalSlots} total`)),

function renderMyShifts() {
  // 4-week window: starts on Monday of viewWeek
  if (!STATE.viewWeekStart) {
    STATE.viewWeekStart = getMonday(new Date());
  }
  const weekStart = STATE.viewWeekStart;
  const days = get4WeekDays(weekStart);
  const today = toISO(new Date());

  const prevPeriod = () => { STATE.viewWeekStart = addDays(weekStart, -28); render(); };
  const nextPeriod = () => { STATE.viewWeekStart = addDays(weekStart, 28); render(); };

  // My assignments in this window
  const myAssignedKeys = new Set(
    Object.entries(STATE.assignments)
      .filter(([,agents]) => agents.some(a => a.agent === STATE.user))
      .map(([key]) => key)
  );

  const nightCount = STATE.nightCounts[STATE.user] || 0;
  const myTotalMain = Object.entries(STATE.assignments)
    .filter(([,agents]) => agents.some(a => a.agent === STATE.user && a.type === 'main'))
    .length;

  // Listing: my shifts sorted
  const myShiftsList = Object.entries(STATE.assignments)
    .flatMap(([key, agents]) => {
      const mine = agents.filter(a => a.agent === STATE.user);
      if (!mine.length) return [];
      const [date, shiftId] = key.split('_');
      return mine.map(a => ({date, shiftId, type: a.type}));
    })
    .filter(s => {
      const d = new Date(s.date);
      return d >= weekStart && d < addDays(weekStart, 28);
    })
    .sort((a,b) => {
      if (a.date !== b.date) return a.date.localeCompare(b.date);
      return SHIFT_DISPLAY_ORDER.indexOf(a.shiftId) - SHIFT_DISPLAY_ORDER.indexOf(b.shiftId);
    });

  const pendingRejects = new Set(
    STATE.requests
      .filter(r => r.agent === STATE.user && r.type === 'reject' && r.status === 'pending')
      .map(r => `${r.date}_${r.shiftId}`)
  );

  // Period label
  const endDay = addDays(weekStart, 27);
  const DAY_NAMES_SHORT = ['dim','lun','mar','mer','jeu','ven','sam'];
  const MONTH_KEYS = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const periodLabel = `${weekStart.getDate()} ${t(MONTH_KEYS[weekStart.getMonth()])} – ${endDay.getDate()} ${t(MONTH_KEYS[endDay.getMonth()])} ${endDay.getFullYear()}`;

  // ── Build grid ────────────────────────────────────────────────────────────

  // Auto-detect mobile
  const isMobile = window.innerWidth < 700;

  // Build proper calendar weeks (Mon-Sun) for the 4-week period
  function buildGrid() {
    const SHIFT_COLORS_GRID = {
      S4:{bg:'#ede9fe',border:'#c4b5fd',text:'#6d28d9',label:'00h–06h ★'},
      S1:{bg:'#dbeafe',border:'#93c5fd',text:'#1d4ed8',label:'06h–12h'},
      S2:{bg:'#fce7f3',border:'#f9a8d4',text:'#be185d',label:'12h–18h'},
      S3:{bg:'#d1fae5',border:'#6ee7b7',text:'#065f46',label:'18h–00h'},
    };
    const DAY_N_G = ['dim','lun','mar','mer','jeu','ven','sam'];

    // Split days into proper Mon-Sun weeks
    const weeks_g = [];
    let wtmp_g = [];
    days.forEach(d => {
      if (d.getDay()===1 && wtmp_g.length>0) { weeks_g.push(wtmp_g); wtmp_g=[]; }
      wtmp_g.push(d);
    });
    if (wtmp_g.length>0) weeks_g.push(wtmp_g);

    function buildWeekGrid(weekDays) {
      const wlabel = `Semaine du ${weekDays[0].getDate()} ${t(MONTH_KEYS[weekDays[0].getMonth()])}`;
      const isWE_g = d => d.getDay()===0||d.getDay()===6;

      const hdr = el('div',{style:{
        display:'grid', gridTemplateColumns:`72px repeat(${weekDays.length},1fr)`,
        background:'var(--bg)', borderBottom:'1px solid var(--border)',
        borderTop:'2px solid var(--border2)', marginTop:'10px'
      }},
        el('div',{style:{padding:'5px 8px',fontSize:'10px',fontWeight:'600',
          color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.5px'}}, wlabel),
        ...weekDays.map(d => {
          const isToday_g = toISO(d) === toISO(new Date());
          return el('div',{style:{
            padding:'5px 2px',textAlign:'center',
            background:isToday_g?'var(--accent-light)':isWE_g(d)?'#f8f8f6':'transparent'
          }},
            el('div',{style:{fontSize:'9px',textTransform:'uppercase',
              color:isToday_g?'var(--accent)':isWE_g(d)?'var(--accent)':'var(--text3)'}},

      const shiftRows = SHIFT_DISPLAY_ORDER.map(shiftId => {
        const sc = SHIFT_COLORS_GRID[shiftId];
        return el('div',{style:{
          display:'grid', gridTemplateColumns:`72px repeat(${weekDays.length},1fr)`,
          borderBottom:'1px solid var(--border)', minHeight:'44px'
        }},

            justifyContent:'center',borderRight:'1px solid var(--border)',background:sc.bg}},
            el('span',{style:{fontSize:'9px',fontWeight:'700',color:sc.text}}, sc.label)
          ),
          ...weekDays.map(d => {
            const dateStr = toISO(d);
            const lookupDate = storageDate(dateStr, shiftId);
            const key = `${lookupDate}_${shiftId}`;
            const assigns = getAssignments(lookupDate, shiftId);
            const myAssign = assigns.find(a => a.agent === STATE.user);
            const isWE_g = d.getDay()===0||d.getDay()===6;
            const isToday_g = dateStr === toISO(new Date());
            const isPR = pendingRejects.has(key);
            const slotExists = !!STATE.availData?.slots[key] || assigns.length > 0;

            if (!slotExists) return el('div',{style:{
              borderRight:'1px solid var(--border)',
              background:isWE_g?'#f8f8f6':'transparent'
            }});

            let cell;
            if (myAssign) {
              const label = myAssign.type==='doublon'?'↻':'✓';
              cell = el('div',{
                style:{margin:'3px',padding:'3px 5px',borderRadius:'5px',
                  background:myAssign.type==='doublon'?'#ede9fe':sc.bg,
                  border:`1px solid ${myAssign.type==='doublon'?'#c4b5fd':sc.border}`,
                  fontSize:'10px',fontWeight:'600',
                  color:myAssign.type==='doublon'?'#6d28d9':sc.text,
                  cursor:isPR?'default':'pointer',opacity:isPR?0.6:1},
                onClick:isPR?null:()=>{STATE.modal={type:'reject',date:lookupDate,shiftId};render();}
              }, isPR?'⏳':label+' Moi');
            } else if (assigns.length > 0) {
              cell = el('div',{style:{margin:'3px',padding:'3px 5px',borderRadius:'5px',
                background:'var(--bg)',border:'1px solid var(--border2)',
                fontSize:'10px',color:'var(--text3)',fontStyle:'italic'}},'✗ Attribué');
            } else {
              const open = isSlotOpen(dateStr, shiftId);
              cell = el('div',{
                style:{margin:'3px',padding:'3px 5px',borderRadius:'5px',
                  background:open?'#f0fdf4':'var(--bg)',
                  border:open?'1px dashed #86efac':'1px solid var(--border)',
                  fontSize:'10px',color:open?'#15803d':'var(--text3)',
                  cursor:open?'pointer':'default'},
                onClick:open?()=>{
                  dbAddRequest('claim',STATE.user,storageDate(dateStr,shiftId),shiftId)
                    .then(()=>{showToast(t('requestSent'),'info');render();})
                    .catch(e=>showToast(e.message,'error'));
                }:null
              }, open?'+ Dispo':'—');
            }
            return el('div',{style:{
              borderRight:'1px solid var(--border)',
              background:isToday_g?'#f8fbff':isWE_g?'#f8f8f6':'transparent',
              padding:'2px 0'
            }}, cell);
          })
        );
      });
      return el('div',{}, hdr, ...shiftRows);
    }

    return el('div',{style:{
      background:'var(--surface)',border:'1px solid var(--border)',
      borderRadius:'var(--radius-lg)',overflow:'hidden',
      overflowX:'auto', marginBottom:'16px'
    }}, ...weeks_g.map(buildWeekGrid));
  }

      S1:{bg:'#dbeafe',border:'#93c5fd',text:'#1d4ed8',label:'06h–12h'},
      S2:{bg:'#fce7f3',border:'#f9a8d4',text:'#be185d',label:'12h–18h'},
      S3:{bg:'#d1fae5',border:'#6ee7b7',text:'#065f46',label:'18h–00h'},
    };
    const DAY_N_M = ['dim','lun','mar','mer','jeu','ven','sam'];

    return el('div',{},
      ...days.map(d => {
        const dateStr = toISO(d);
        const isWE = d.getDay()===0||d.getDay()===6;
        const isToday = dateStr === toISO(new Date());

        // Check if this day has any relevant shifts
        const dayShifts = SHIFT_DISPLAY_ORDER.map(shiftId => {
          const lookupDate = storageDate(dateStr, shiftId);
          const assigns = getAssignments(lookupDate, shiftId);
          const myAssign = assigns.find(a=>a.agent===STATE.user);
          const open = isSlotOpen(dateStr, shiftId);

          borderLeft:`3px solid ${isToday?'var(--accent)':isWE?'var(--accent)':'var(--border2)'}`
        }},

            padding:'8px 12px',fontWeight:'600',fontSize:'13px',

              return el('div',{style:{

                padding:'8px 10px',marginBottom:'6px',borderRadius:'var(--radius)',
                background:myAssign?sc.bg:open?'#f0fdf4':'var(--bg)',
                border:`1px solid ${myAssign?sc.border:open?'#86efac':'var(--border)'}`,
              }},
                el('span',{style:{fontSize:'12px',fontWeight:'600',color:sc.text}}, sc.label),
                myAssign
                  ? el('span',{style:{fontSize:'12px',color:myAssign.type==='doublon'?'#6d28d9':sc.text,fontWeight:'600'}},
                      isPR?'⏳ rejet en attente':myAssign.type==='doublon'?'↻ doublon':'✓ Attribué')
                  : el('button',{
                      style:{fontSize:'11px',padding:'4px 10px',borderRadius:'var(--radius)',
                        border:'1px solid #86efac',background:'#dcfce7',color:'#15803d',cursor:'pointer'},
                      onClick:()=>{
                        dbAddRequest('claim',STATE.user,lookupDate,shiftId)

                          .catch(e=>showToast(e.message,'error'));
                      }
                    },'+ Demander')

          )
        );
      }).filter(Boolean)
    );
  }

  function buildListing() {
    if (!myShiftsList.length) {
      return el('div',{class:'empty-state'},el('div',{class:'empty-icon'},'📋'),el('p',{},t('noShiftsYet')));
    }
    return el('div',{class:'shift-list'},
      ...myShiftsList.map(s => {
        const sc = SHIFT_COLORS[s.shiftId] || SHIFT_COLORS.S1;
        const isNight = s.shiftId === 'S4';
        const isPendingReject = pendingRejects.has(`${s.date}_${s.shiftId}`);
        return el('div',{class:`shift-row mine${isNight?' night-shift':''}`, style:{borderLeft:`3px solid ${sc.border}`}},
          el('div',{class:'shift-date'},formatDate(s.date)),
          el('div',{class:'shift-time',style:{color:sc.text}}, sc.label),
          el('div',{},

  return el('div',{},
    el('div',{class:'page-header'},
      el('div',{},
        el('div',{class:'page-title'}, t('myShifts')),
        el('div',{class:'page-subtitle'}, displayName(STATE.user))

    ),
    el('div',{class:'stats-row'},

    STATE.agentTab === 'list' ? buildListing() : buildGrid()
